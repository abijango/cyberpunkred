name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: fmt + clippy + test + wasm-pack
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Toolchain channel, components, and targets are pinned in
      # rust-toolchain.toml; the action reads it automatically.
      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Install wasm-pack
        uses: jetli/wasm-pack-action@v0.4.0
        with:
          version: latest

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: cargo test --workspace
        run: cargo test --workspace

      - name: wasm-pack build crates/web --target web
        run: wasm-pack build crates/web --target web
